# Opays HQ — Configuration Dokploy
app:
  name: opays-hq
  type: dockerfile
  port: 3001
  build:
    dockerfile: Dockerfile
  healthCheck:
    path: /api/health
    interval: 30
    timeout: 10
    retries: 3
  domains:
    - hq.opays.io
  environment:
    - NODE_ENV=production
    - PORT=3001
    - JWT_SECRET=${JWT_SECRET}
  volumes:
    - /data/opays-hq:/app/data
